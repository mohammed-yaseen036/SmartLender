<!DOCTYPE html>
<html>
<head>
    <title>Smart Lender - Result</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #ff9800, #f44336);
        }
        .result-box {
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid white;
            border-radius: 10px;
            padding: 40px 60px;
            text-align: center;
            color: white;
        }
        h1 {
            margin-bottom: 20px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.4);
        }
        .result-text {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        a.back-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 24px;
            background-color: white;
            color: #f44336;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="result-box">
        <h1>Loan Approval Prediction</h1>
        <div class="result-text">{{ result }}</div>
        <a class="back-btn" href="/predict">Try Again</a>
    </div>
</body>
</html>
