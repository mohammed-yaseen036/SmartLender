<!DOCTYPE html>
<html>
<head>
    <title>Smart Lender</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: 80px auto;
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2e7d32;
        }
        p {
            color: #555;
            line-height: 1.6;
        }
        a.predict-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background-color: #2e7d32;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 16px;
        }
        a.predict-btn:hover {
            background-color: #256428;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Smart Lender</h1>
        <p>
            Smart Lender is a machine learning-powered application that predicts
            the creditworthiness of loan applicants using Decision Tree, Random
            Forest, KNN, and Gradient Boosting classifiers. Enter applicant details
            to instantly check loan approval likelihood.
        </p>
        <a class="predict-btn" href="/predict">Predict</a>
    </div>
</body>
</html>
